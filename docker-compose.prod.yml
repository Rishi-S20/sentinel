version: "3.9"

# Production overrides — use with:
# docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  backend:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
    volumes: []  # No live reload in production
    restart: always

  celery_worker:
    command: celery -A app.workers.celery_app worker --loglevel=warning --concurrency=4
    volumes: []
    restart: always

  celery_beat:
    command: celery -A app.workers.celery_app beat --loglevel=warning
    volumes: []
    restart: always

  frontend:
    command: npm run preview -- --host 0.0.0.0
    volumes: []
    restart: always

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend
    restart: always
